<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos avanzados</title>
</head>
<body>
    <div class="container">
        <div class="item" id="item-a">
            div with id: <code>item-a</code>
        </div>
        <div class="item" id="item-b">
            div with id <code>item-b</code>
        </div>
    </div>
</body>
</html>
<style>
    .container {
        display: flex;
        flex-wrap: wrap;
        width: 800px;
        gap: 100px;
        border: 1px solid black;
        justify-content: center;
        margin: 40px auto;
        background-color: #fad7ef;
    }
    .item {
        width: 200px;
        height: 200px;
        border: 1px solid black;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 80px 0px;
    }
    #item-a {
        background-color: #b1cff2;
    }
    #item-b {
        background-color: #9fe09e;
    }
</style>
<script>
    document.querySelector('#item-a').addEventListener('click', (e) => {
       
        console.log('azul');
        e.stopPropagation()
    });

    document.querySelector('#item-b').addEventListener('click', (e) => {
        e.stopPropagation()
        console.log('verde');
    });
    document.querySelector('.container').addEventListener('click', (ev) => {
        console.log('rosa');
    });

</script>
