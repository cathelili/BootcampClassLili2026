<body>

    <h1>🎨 Elige un color</h1>
    <p>Pulsa un botón para cambiar el color de la caja.</p>

    <div class="colores">
        <button class="button" id="btn-rojo">Rojo</button>
        <button class="button" id="btn-azul">Azul</button>
        <button class="button"  id="btn-verde">Verde</button>
        <button class="button" id="btn-amarillo">Amarillo</button>
        <button class="button" id="btn-morado">Morado</button>
    </div>

    <div id="caja"></div>
    <p id="mensaje">Ningún color seleccionado.</p>



</body>

</html>

<script>
const caja =document.getElementById("caja")
const mensaje = document.getElementById("mensaje")
    const buttonEl = document.querySelector(".button").addEventListener("click", (e) => {
        const buttonId = e.target.id;
        

        if (buttonId.includes("rojo")) {
          caja.style.backgroundColor= "red"
          mensaje.textContent = "Has elegido: Rojo";
        }
       
       else if (buttonId.includes("verde")) {
          caja.style.backgroundColor= "green"
          mensaje.textContent = "Has elegido: Verde";
        }
    });


</script>
