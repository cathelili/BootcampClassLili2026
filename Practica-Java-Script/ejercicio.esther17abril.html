<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Color Favorito — Ejercicio 0</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
      background-color: #f5f5f5;
    }

    h1 {
      color: #333;
      margin-bottom: 8px;
    }

    p {
      color: #666;
      margin-bottom: 32px;
    }

    .colores {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    button {
      width: 80px;
      height: 80px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      transition: transform 0.1s;
    }

    button:hover {
      transform: scale(1.1);
    }

    #btn-rojo     { background-color: #e74c3c; }
    #btn-azul     { background-color: #3498db; }
    #btn-verde    { background-color: #2ecc71; }
    #btn-amarillo { background-color: #f1c40f; color: #333; text-shadow: none; }
    #btn-morado   { background-color: #9b59b6; }

    #caja {
      width: 160px;
      height: 160px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background-color: #ddd;
      transition: background-color 0.3s;
    }

    #mensaje {
      font-size: 1.1rem;
      color: #444;
      min-height: 28px;
    }
  </style>
</head>

``` <body>

    <h1>🎨 Elige un color</h1>
    <p>Pulsa un botón para cambiar el color de la caja.</p>
  
    <div class="colores">
      <button id="btn-rojo">Rojo</button>
      <button id="btn-azul">Azul</button>
      <button id="btn-verde">Verde</button>
      <button id="btn-amarillo">Amarillo</button>
      <button id="btn-morado">Morado</button>
    </div>
  
    <div id="caja"></div>
    <p id="mensaje">Ningún color seleccionado.</p>
  
    
  
  </body>
  </html>
  
  <script>
  

 // Recuperamos los elementos que vamos a necesitar
    const caja    = document.getElementById("caja");
    const mensaje = document.getElementById("mensaje");

    // --- Solución paso a paso (sin reto extra) ---

    document.getElementById("btn-rojo").addEventListener("click", function() {
      caja.style.backgroundColor = "red";
      mensaje.textContent = "Has elegido: Rojo";
    });

    document.getElementById("btn-azul").addEventListener("click", function() {
      caja.style.backgroundColor = "blue";
      mensaje.textContent = "Has elegido: Azul";
    });

    document.getElementById("btn-verde").addEventListener("click", function() {
      caja.style.backgroundColor = "green";
      mensaje.textContent = "Has elegido: Verde";
    });

    document.getElementById("btn-amarillo").addEventListener("click", function() {
      caja.style.backgroundColor = "yellow";
      mensaje.textContent = "Has elegido: Amarillo";
    });

    document.getElementById("btn-morado").addEventListener("click", function() {
      caja.style.backgroundColor = "purple";
      mensaje.textContent = "Has elegido: Morado";
    });
    


  </script>
