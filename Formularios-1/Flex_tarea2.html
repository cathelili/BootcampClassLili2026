<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex tarea2</title>
    <style>
        .toolbar {
            display: flex;
            border: 1px solid black;
            background-color: hwb(22 5% 10%);
            justify-content: space-between;
            flex-wrap: wrap;
        }
    
        .type {
            border: 2px solid red;
            flex-grow: 4;
            
    
    
    
        }
        .button {
            background-color: #4d0ce5;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
    
    
    </style>
</head>

<body>
    <nav class="toolbar">
        <div class="grp grp--brand">
            <strong>MiApp</strong>
        </div>
        <div class="grp grp--search">
            <input type="search" placeholder="Buscar…" aria- label="Buscar" />
            <button class="btn btn--ghost">Atajos</button>
        </div>
        <div class="grp grp--primary">
            <button class="btn">Nuevo</button>
            <button class="btn">Guardar</button>
        </div>
        <div class="grp grp--secondary">
            <button class="btn btn--ghost">Compartir</button>
            <button class="btn btn--ghost">Exportar</button>
        </div>
        <div class="grp grp--user">
            <img class="avatar" src="https://i.pravatar.cc/40?img=5" alt="Usuario" />
            <span>Selma</span>
        </div>
    </nav>
</body>

</html>
